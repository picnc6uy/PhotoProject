name: Orchestrator Workflow

on:
  push:
    branches: [ feature/version2, master, main ]
  pull_request:

jobs:
  orchestrator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'tools/agent_platform/**/*.py', 'src/agent_platform/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run orchestrator workflow
        run: python tools/agent_platform/run_workflow.py --workspace . --task dev_data/agent_platform/tasks/sample_task.yaml

      - name: Run evaluation harness
        run: python tools/agent_platform/evaluate_workflow.py --workspace .

      - name: Run tests
        run: pytest -q
