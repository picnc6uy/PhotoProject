name: Orchestrator Workflow

on:
  push:
    branches: [ feature/version2, master, main ]
  pull_request:

jobs:
  orchestrator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run orchestrator workflow
        run: python tools/agent_platform/run_workflow.py --workspace .

      - name: Run tests
        run: pytest -q
