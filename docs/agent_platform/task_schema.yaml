# Agent Task Specification (YAML)

# Required fields
# - title: string
# - summary: string
# - requirements: list of strings
#
# Optional fields
# - acceptance: list of acceptance-criterion objects:
#     - id: string
#     - description: string
#     - automated_checks: list of strings
#     - manual_notes: list of strings
# - metadata: dictionary with recognised keys:
#     - risk_level: low|medium|high
#     - touches_docs: boolean
#     - touches_ci: boolean
#     - dependencies: list of strings
#     - components: list of strings
#     - test_commands: list of shell command strings
#     - doc_updates: list of file paths
#     - deployment_commands: list of shell command strings
#     - monitoring_signals: list of metric objects (metric/value pairs)
#     - requires_rollback_plan: boolean
#     - extended_monitoring: boolean
#
# Example
# ---
# title: Improve shell tooling
# summary: Allow orchestrator workflow to execute pytest directly while keeping safeguards.
# requirements:
#   - Implement tool allow-lists
#   - Provide CLI overrides
# acceptance:
#   - id: AC-01
#     description: Shell tool enforces allow list by default
#     automated_checks: ["pytest -q"]
# metadata:
#   risk_level: medium
#   touches_docs: true
#   test_commands:
#     - pytest -q
