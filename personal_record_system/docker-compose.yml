version: 3.9

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - 8000:8000
    command: uvicorn personal_record_system.app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -m personal_record_system.scripts.placeholder
    restart: no
